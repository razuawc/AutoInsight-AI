global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "ai-backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: "/metrics"
    scheme: http
    scrape_interval: 10s

  - job_name: "n8n"
    static_configs:
      - targets: ["n8n:5678"]
    metrics_path: "/metrics"
    scheme: http
    scrape_interval: 10s

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres:9187"]
    scrape_interval: 15s

  - job_name: "redis"
    static_configs:
      - targets: ["redis:9121"]
    scrape_interval: 15s

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
    scrape_interval: 30s
