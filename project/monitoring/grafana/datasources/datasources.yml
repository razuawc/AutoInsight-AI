apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: PostgreSQL
    type: postgres
    access: proxy
    url: postgres:5432
    database: ai_workflow_hub
    user: aihub
    secureJsonData:
      password: aihub_secret
    jsonData:
      sslmode: disable
    editable: true
